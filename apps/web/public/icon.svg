<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="atlas" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f2a98f"/>
      <stop offset="1" stop-color="#b5502f"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="42" fill="#0e1116"/>
  <!-- Constellation "A": life domains as one connected graph. -->
  <g transform="translate(21 21) scale(1.5)" stroke-linecap="round">
    <g stroke="url(#atlas)" stroke-width="4" fill="none">
      <line x1="50" y1="20" x2="24" y2="80"/>
      <line x1="50" y1="20" x2="76" y2="80"/>
      <line x1="37" y1="50" x2="63" y2="50"/>
    </g>
    <g fill="url(#atlas)">
      <circle cx="50" cy="20" r="6.5"/>
      <circle cx="24" cy="80" r="6.5"/>
      <circle cx="76" cy="80" r="6.5"/>
      <circle cx="37" cy="50" r="4.5"/>
      <circle cx="63" cy="50" r="4.5"/>
    </g>
  </g>
</svg>
