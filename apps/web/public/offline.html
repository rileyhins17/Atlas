<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Atlas — offline</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0e1116;
        color: #e6e9ef;
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .card {
        text-align: center;
        padding: 32px;
        max-width: 340px;
      }
      h1 {
        font-size: 22px;
        margin: 0 0 8px;
      }
      p {
        color: #9aa4b2;
        font-size: 14px;
        line-height: 1.5;
        margin: 0 0 20px;
      }
      button {
        font: inherit;
        font-weight: 600;
        background: #5b8cff;
        color: #0e1116;
        border: none;
        border-radius: 10px;
        padding: 12px 16px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You're offline</h1>
      <p>Atlas can't reach the network right now. Check your connection and try again.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
